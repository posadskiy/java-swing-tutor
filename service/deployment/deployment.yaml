apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-swing-tutor-service
  namespace: java-swing-tutor
  labels:
    app: java-swing-tutor-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-swing-tutor-service
  template:
    metadata:
      labels:
        app: java-swing-tutor-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/prometheus"
        prometheus.io/port: "8400"
    spec:
      imagePullSecrets:
        - name: dockerhub-registry-secret
      containers:
        - name: java-swing-tutor-service
          image: ${IMAGE_VERSION}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8400
              protocol: TCP
          env:
            - name: MICRONAUT_ENVIRONMENTS
              value: "prod"
            - name: JAVA_SWING_TUTOR_DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: java-swing-tutor-config
                  key: db.url
            - name: JAVA_SWING_TUTOR_DATABASE_USER
              valueFrom:
                configMapKeyRef:
                  name: java-swing-tutor-config
                  key: db.user
            - name: JAVA_SWING_TUTOR_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: java-swing-tutor-secrets
                  key: db.password
            - name: JAVA_SWING_TUTOR_SERVICE_PORT
              value: "8400"
            - name: AUTH_SERVICE_BASE_URL
              value: "http://auth-service.microservices.svc.cluster.local:8100"
            - name: USER_SERVICE_BASE_URL
              value: "http://user-service.microservices.svc.cluster.local:8095"
            - name: OTEL_SERVICE_NAME
              value: "java-swing-tutor-service"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://grafana-alloy.observability.svc.cluster.local:4317"
            - name: OTEL_TRACES_SAMPLER
              value: parentbased_traceidratio
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "1.0"
            - name: DB_MAX_POOL_SIZE
              value: "2"
            - name: DB_MIN_IDLE
              value: "0"
            - name: DB_IDLE_TIMEOUT
              value: "60000"
            - name: DB_MAX_LIFETIME
              value: "600000"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8400
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8400
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      restartPolicy: Always
